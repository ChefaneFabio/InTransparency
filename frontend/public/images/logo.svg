<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Magnifying glass with IN -->
  <g transform="translate(4, 4) scale(0.45)">
    <!-- Document background -->
    <rect x="22" y="2" width="60" height="78" rx="4" fill="#e8edf2" stroke="#1e293b" stroke-width="3" transform="rotate(-8, 52, 41)"/>
    <rect x="32" y="14" width="40" height="3" rx="1.5" fill="#94a3b8" transform="rotate(-8, 52, 15)"/>
    <rect x="32" y="22" width="35" height="3" rx="1.5" fill="#94a3b8" transform="rotate(-8, 52, 23)"/>
    <rect x="32" y="30" width="30" height="3" rx="1.5" fill="#94a3b8" transform="rotate(-8, 52, 31)"/>
    <!-- Magnifying glass circle -->
    <circle cx="52" cy="48" r="24" fill="white" stroke="#0f172a" stroke-width="5"/>
    <!-- IN text inside magnifying glass -->
    <text x="40" y="57" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="28" fill="#0f172a">IN</text>
    <!-- Magnifying glass handle -->
    <line x1="70" y1="66" x2="90" y2="86" stroke="#0f172a" stroke-width="7" stroke-linecap="round"/>
  </g>
  <!-- Text: InTransparency -->
  <text x="58" y="38" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-weight="700" font-size="26" fill="#0f172a">
    <tspan fill="#0f172a">In</tspan><tspan fill="#2563eb">Transparency</tspan>
  </text>
</svg>
